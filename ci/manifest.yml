projects:
  - libvirt-glib
  - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

gitlab:
  namespace: libvirt
  project: libvirt-glib

targets:
  alpine-322: x86_64

  alpine-323: x86_64

  alpine-edge: x86_64

  almalinux-9:
    jobs:
      - arch: x86_64
        variables:
          RPM: skip

  almalinux-10:
    projects:
      - libvirt-glib
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+minimal.yml
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

    jobs:
      - arch: x86_64
        variables:
          RPM: skip

      - arch: x86_64
        template: .native_git_build_job
        suffix: -git
        variables:
          RPM: skip

  centos-stream-9: x86_64

  centos-stream-10: x86_64

  debian-12: x86_64

  debian-13: x86_64

  debian-sid: x86_64

  fedora-43: x86_64

  fedora-44:
    jobs:
      - arch: x86_64

      - arch: mingw32


  fedora-rawhide:
    jobs:
      - arch: x86_64

      - arch: mingw64

  opensuse-leap-15:
    jobs:
      - arch: x86_64
        variables:
          RPM: skip

  opensuse-leap-16:
    jobs:
      - arch: x86_64
        variables:
          RPM: skip

  opensuse-tumbleweed:
    jobs:
      - arch: x86_64
        variables:
          RPM: skip

  ubuntu-2404: x86_64

  ubuntu-2604: x86_64
